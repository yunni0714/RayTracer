<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Project Ray — 기물 SVG 에디터</title>
<style>
  :root { --bg:#f5f5f7; --panel:#fff; --line:#d9d9de; --ink:#1a1a1e; --sub:#8a8a92; --accent:#4f6df5; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--ink); }
  header { padding:12px 20px; background:var(--panel); border-bottom:1px solid var(--line); display:flex; align-items:baseline; gap:12px; }
  header h1 { font-size:16px; margin:0; }
  header span { font-size:12px; color:var(--sub); }
  main { display:flex; gap:16px; padding:16px 20px; align-items:flex-start; flex-wrap:wrap; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px; }
  .toolbar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; align-items:center; }
  .toolbar .sep { width:1px; align-self:stretch; background:var(--line); margin:0 4px; }
  button { font:inherit; font-size:13px; padding:5px 10px; border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:7px; cursor:pointer; }
  button:hover { border-color:var(--accent); }
  button.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  select, input[type=number] { font:inherit; font-size:13px; padding:4px 6px; border:1px solid var(--line); border-radius:7px; }
  #canvas { display:block; width:520px; height:520px; background:#fff; border:1px solid var(--line); border-radius:8px; touch-action:none; cursor:crosshair; }
  #canvas.select-mode { cursor:default; }
  #coords { font-size:12px; color:var(--sub); margin-top:6px; min-height:16px; }
  .side { width:380px; display:flex; flex-direction:column; gap:14px; }
  .side h2 { font-size:13px; margin:0 0 8px; }
  #elist { display:flex; flex-direction:column; gap:4px; max-height:170px; overflow:auto; }
  #elist .row { display:flex; align-items:center; gap:8px; padding:4px 8px; border:1px solid var(--line); border-radius:7px; font-size:12px; cursor:pointer; }
  #elist .row.sel { border-color:var(--accent); background:#eef1fe; }
  #elist .row .name { flex:1; }
  #elist .row button { padding:1px 7px; font-size:12px; }
  #props { display:flex; gap:12px; flex-wrap:wrap; font-size:13px; align-items:center; min-height:30px; }
  #props label { display:flex; align-items:center; gap:5px; }
  #props input[type=number] { width:60px; }
  textarea { width:100%; height:120px; font:12px/1.5 ui-monospace, monospace; border:1px solid var(--line); border-radius:8px; padding:8px; resize:vertical; }
  .previews { display:flex; gap:10px; align-items:flex-end; }
  .pv { border-radius:8px; display:flex; align-items:center; justify-content:center; }
  .pv svg { width:80%; height:80%; }
  .pv.light { background:#fff; border:1px solid var(--line); color:#1a1a1e; }
  .pv.dark { background:#17171b; color:#e8e8ea; }
  .hint { font-size:12px; color:var(--sub); line-height:1.7; margin:0; }
  kbd { background:#ececf1; border-radius:4px; padding:0 5px; font-size:11px; }
</style>
</head>
<body>
<header>
  <h1>기물 SVG 에디터</h1>
  <span>viewBox 0 0 100 100 · stroke=currentColor · 결과를 svgArt.ts / 어드민 config에 붙여넣기</span>
</header>
<main>
  <section class="panel">
    <div class="toolbar">
      <button id="t-poly" class="on">선/다각형</button>
      <button id="t-circle">원</button>
      <button id="t-select">선택/이동</button>
      <span class="sep"></span>
      <button id="b-close">도형 닫기 (C)</button>
      <button id="b-finish">선 끝내기 (Enter)</button>
      <span class="sep"></span>
      <label style="font-size:13px">스냅
        <select id="snap">
          <option value="1">1</option>
          <option value="2" selected>2</option>
          <option value="5">5</option>
          <option value="10">10</option>
        </select>
      </label>
      <button id="b-undo">되돌리기 (Ctrl+Z)</button>
      <button id="b-clear">전체 지우기</button>
    </div>
    <svg id="canvas" viewBox="0 0 100 100"></svg>
    <div id="coords"></div>
    <p class="hint">
      <b>선/다각형</b>: 클릭으로 점 추가 → <kbd>Enter</kbd>/더블클릭 = 열린 선, <kbd>C</kbd> = 닫힌 도형, <kbd>Backspace</kbd> = 마지막 점 취소, <kbd>Esc</kbd> = 취소.<br>
      <b>원</b>: 중심 누르고 드래그.  <b>선택/이동</b>: 클릭 후 드래그 이동, 핸들 드래그로 점 수정, <kbd>Delete</kbd> = 삭제.
    </p>
  </section>
  <section class="side">
    <div class="panel">
      <h2>요소</h2>
      <div id="elist"></div>
      <div id="props"></div>
    </div>
    <div class="panel">
      <h2>SVG 출력 / 가져오기</h2>
      <textarea id="out" spellcheck="false"></textarea>
      <div class="toolbar" style="margin:8px 0 0">
        <button id="b-copy">복사</button>
        <button id="b-import">가져오기 (textarea → 캔버스)</button>
      </div>
    </div>
    <div class="panel">
      <h2>미리보기</h2>
      <div class="previews">
        <div class="pv light" style="width:96px;height:96px"></div>
        <div class="pv dark" style="width:96px;height:96px"></div>
        <div class="pv light" style="width:48px;height:48px"></div>
        <div class="pv dark" style="width:48px;height:48px"></div>
        <div class="pv light" style="width:28px;height:28px"></div>
        <div class="pv dark" style="width:28px;height:28px"></div>
      </div>
    </div>
  </section>
</main>
<script>
'use strict';
const SVGNS = 'http://www.w3.org/2000/svg';
const canvas = document.getElementById('canvas');
const out = document.getElementById('out');

const state = {
  elements: [],   // {kind:'poly',pts,closed,sw,fill,dash} | {kind:'circle',cx,cy,r,sw,fill} | {kind:'raw',markup}
  selected: -1,
  tool: 'poly',
  snap: 2,
  draft: null,    // 작성 중인 poly 점 배열
  cursor: null,
  drag: null,     // {type:'move'|'point'|'radius', idx, pi, start, orig}
};
const undoStack = [];

function pushUndo() {
  undoStack.push(structuredClone(state.elements));
  if (undoStack.length > 100) undoStack.shift();
}
function undo() {
  if (!undoStack.length) return;
  state.elements = undoStack.pop();
  state.selected = -1;
  state.draft = null;
  render();
}

/* ── 좌표 ── */
function snapV(v) {
  const s = state.snap;
  return Math.min(100, Math.max(0, Math.round(v / s) * s));
}
function evtPos(e, doSnap = true) {
  const r = canvas.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width * 100;
  const y = (e.clientY - r.top) / r.height * 100;
  return doSnap ? [snapV(x), snapV(y)] : [x, y];
}
const fmt = n => String(Math.round(n * 10) / 10);

/* ── 직렬화 (svgArt.ts 하우스 스타일) ── */
function elToStr(el) {
  if (el.kind === 'raw') return el.markup;
  if (el.kind === 'circle')
    return `<circle cx="${fmt(el.cx)}" cy="${fmt(el.cy)}" r="${fmt(el.r)}" fill="${el.fill}" stroke="currentColor" stroke-width="${el.sw}"/>`;
  const d = el.pts.map((p, i) => (i ? 'L' : 'M') + fmt(p[0]) + ' ' + fmt(p[1])).join(' ') + (el.closed ? ' Z' : '');
  const join = el.closed ? ' stroke-linejoin="miter"' : ' stroke-linecap="square"';
  const dash = el.dash ? ' stroke-dasharray="14 9"' : '';
  return `<path d="${d}" fill="${el.fill}" stroke="currentColor" stroke-width="${el.sw}"${dash}${join}/>`;
}
function toSvgString() {
  return `<svg viewBox="0 0 100 100">` + state.elements.map(elToStr).join('') + `</svg>`;
}

/* ── 가져오기 파서: M/L/H/V/Z(+소문자, 암시적 반복) → poly, circle/rect 지원, 그 외 raw ── */
function parsePathToPolys(d, attrs) {
  const tokens = d.match(/[MLHVZmlhvz]|-?\d*\.?\d+/g);
  if (!tokens) return null;
  if (d.match(/[^MLHVZmlhvz0-9\s.,-]/)) return null; // A/Q/C 등은 raw 로
  const polys = [];
  let cur = null, cx = 0, cy = 0, cmd = null;
  let i = 0;
  const num = () => parseFloat(tokens[i++]);
  while (i < tokens.length) {
    const t = tokens[i];
    if (/[MLHVZmlhvz]/.test(t)) { cmd = t; i++; if (cmd === 'Z' || cmd === 'z') { if (cur) cur.closed = true; cur = null; continue; } }
    else if (cmd === null) return null;
    const rel = cmd === cmd.toLowerCase();
    switch (cmd.toUpperCase()) {
      case 'M': {
        const x = num(), y = num();
        cx = rel && cur ? cx + x : (rel && polys.length && !cur ? cx + x : (rel ? x : x));
        cy = rel && cur ? cy + y : (rel && polys.length && !cur ? cy + y : (rel ? y : y));
        if (rel && !cur && !polys.length) { cx = x; cy = y; } // 첫 m 은 절대 취급
        cur = { kind: 'poly', pts: [[cx, cy]], closed: false, ...attrs };
        polys.push(cur);
        cmd = rel ? 'l' : 'L'; // 암시적 후속 좌표는 L
        break;
      }
      case 'L': {
        const x = num(), y = num();
        cx = rel ? cx + x : x; cy = rel ? cy + y : y;
        if (!cur) return null;
        cur.pts.push([cx, cy]);
        break;
      }
      case 'H': { const x = num(); cx = rel ? cx + x : x; if (!cur) return null; cur.pts.push([cx, cy]); break; }
      case 'V': { const y = num(); cy = rel ? cy + y : y; if (!cur) return null; cur.pts.push([cx, cy]); break; }
      default: return null;
    }
  }
  return polys.filter(p => p.pts.length >= 2 || p.closed);
}
function importSvg(text) {
  const doc = new DOMParser().parseFromString(text.trim(), 'image/svg+xml');
  const root = doc.querySelector('svg');
  if (!root || doc.querySelector('parsererror')) { alert('SVG 파싱 실패'); return; }
  const els = [];
  for (const node of root.children) {
    const sw = parseFloat(node.getAttribute('stroke-width')) || 8;
    const fillAttr = node.getAttribute('fill');
    const attrs = {
      sw,
      fill: fillAttr && fillAttr !== 'none' ? 'currentColor' : 'none',
      dash: node.hasAttribute('stroke-dasharray'),
    };
    const tag = node.tagName.toLowerCase();
    if (tag === 'circle') {
      els.push({ kind: 'circle', cx: +node.getAttribute('cx'), cy: +node.getAttribute('cy'), r: +node.getAttribute('r'), sw: attrs.sw, fill: attrs.fill });
    } else if (tag === 'rect') {
      const x = +node.getAttribute('x'), y = +node.getAttribute('y'), w = +node.getAttribute('width'), h = +node.getAttribute('height');
      els.push({ kind: 'poly', pts: [[x, y], [x + w, y], [x + w, y + h], [x, y + h]], closed: true, ...attrs });
    } else if (tag === 'path') {
      const polys = parsePathToPolys(node.getAttribute('d') || '', attrs);
      if (polys) els.push(...polys);
      else els.push({ kind: 'raw', markup: node.outerHTML.replace(/ xmlns="[^"]*"/, '') });
    } else {
      els.push({ kind: 'raw', markup: node.outerHTML.replace(/ xmlns="[^"]*"/, '') });
    }
  }
  pushUndo();
  state.elements = els;
  state.selected = -1;
  state.draft = null;
  render();
}

/* ── 렌더 ── */
function gridMarkup() {
  let s = '';
  for (let v = 0; v <= 100; v += 5) {
    const major = v % 10 === 0;
    const c = v === 50 ? '#c9d2f8' : major ? '#e4e4ea' : '#f1f1f5';
    s += `<line x1="${v}" y1="0" x2="${v}" y2="100" stroke="${c}" stroke-width="${v === 50 ? 0.5 : 0.3}"/>`;
    s += `<line x1="0" y1="${v}" x2="100" y2="${v}" stroke="${c}" stroke-width="${v === 50 ? 0.5 : 0.3}"/>`;
  }
  return s;
}
const GRID = gridMarkup();

function render() {
  let body = GRID;
  state.elements.forEach((el, i) => {
    const sel = i === state.selected;
    body += `<g data-idx="${i}" style="color:${sel ? '#4f6df5' : '#1a1a1e'}">${elToStr(el)}</g>`;
  });
  // 작성 중 폴리라인
  if (state.draft && state.draft.length) {
    const d = state.draft.map((p, i) => (i ? 'L' : 'M') + p[0] + ' ' + p[1]).join(' ');
    body += `<path d="${d}" fill="none" stroke="#e0653a" stroke-width="2"/>`;
    if (state.cursor) {
      const last = state.draft[state.draft.length - 1];
      body += `<line x1="${last[0]}" y1="${last[1]}" x2="${state.cursor[0]}" y2="${state.cursor[1]}" stroke="#e0653a" stroke-width="1" stroke-dasharray="3 2"/>`;
    }
    for (const p of state.draft) body += `<circle cx="${p[0]}" cy="${p[1]}" r="1.6" fill="#e0653a"/>`;
  }
  // 선택 핸들
  const sel = state.elements[state.selected];
  if (sel && state.tool === 'select') {
    if (sel.kind === 'poly') {
      sel.pts.forEach((p, pi) => {
        body += `<circle data-handle="${pi}" cx="${p[0]}" cy="${p[1]}" r="2.4" fill="#fff" stroke="#4f6df5" stroke-width="1" style="cursor:move"/>`;
      });
    } else if (sel.kind === 'circle') {
      body += `<circle data-handle="c" cx="${sel.cx}" cy="${sel.cy}" r="2.4" fill="#fff" stroke="#4f6df5" stroke-width="1" style="cursor:move"/>`;
      body += `<circle data-handle="r" cx="${sel.cx + sel.r}" cy="${sel.cy}" r="2.4" fill="#4f6df5" style="cursor:ew-resize"/>`;
    }
  }
  canvas.innerHTML = body;

  // 출력 (편집 중엔 덮어쓰지 않음)
  if (document.activeElement !== out) out.value = toSvgString();
  // 미리보기
  document.querySelectorAll('.pv').forEach(pv => { pv.innerHTML = toSvgString(); });
  renderList();
  renderProps();
}

function elName(el) {
  if (el.kind === 'poly') return (el.closed ? '다각형' : '선') + ` · 점 ${el.pts.length}`;
  if (el.kind === 'circle') return `원 · r ${fmt(el.r)}`;
  return 'raw (수정 불가)';
}
function renderList() {
  const list = document.getElementById('elist');
  list.innerHTML = '';
  state.elements.forEach((el, i) => {
    const row = document.createElement('div');
    row.className = 'row' + (i === state.selected ? ' sel' : '');
    row.innerHTML = `<span class="name">${i + 1}. ${elName(el)}</span>`;
    row.onclick = () => { state.selected = i; setTool('select'); };
    const del = document.createElement('button');
    del.textContent = '✕';
    del.onclick = e => { e.stopPropagation(); pushUndo(); state.elements.splice(i, 1); state.selected = -1; render(); };
    row.appendChild(del);
    list.appendChild(row);
  });
  if (!state.elements.length) list.innerHTML = '<span style="font-size:12px;color:var(--sub)">아직 요소 없음 — 캔버스에 그리거나 SVG를 가져오세요</span>';
}
function renderProps() {
  const box = document.getElementById('props');
  const el = state.elements[state.selected];
  if (!el || el.kind === 'raw') { box.innerHTML = el ? '<span style="color:var(--sub)">raw 요소 — 삭제만 가능</span>' : ''; return; }
  box.innerHTML = '';
  const mk = (label, input) => {
    const l = document.createElement('label');
    l.append(label, input);
    box.appendChild(l);
  };
  const swIn = document.createElement('input');
  swIn.type = 'number'; swIn.min = 1; swIn.max = 14; swIn.step = 0.5; swIn.value = el.sw;
  swIn.onchange = () => { pushUndo(); el.sw = +swIn.value || 8; render(); };
  mk('굵기', swIn);
  const fillIn = document.createElement('input');
  fillIn.type = 'checkbox'; fillIn.checked = el.fill !== 'none';
  fillIn.onchange = () => { pushUndo(); el.fill = fillIn.checked ? 'currentColor' : 'none'; render(); };
  mk('채움', fillIn);
  if (el.kind === 'poly') {
    const cIn = document.createElement('input');
    cIn.type = 'checkbox'; cIn.checked = el.closed;
    cIn.onchange = () => { pushUndo(); el.closed = cIn.checked; render(); };
    mk('닫힘', cIn);
    const dIn = document.createElement('input');
    dIn.type = 'checkbox'; dIn.checked = !!el.dash;
    dIn.onchange = () => { pushUndo(); el.dash = dIn.checked; render(); };
    mk('점선', dIn);
  }
}

/* ── 도구 ── */
function setTool(t) {
  state.tool = t;
  state.draft = null;
  canvas.classList.toggle('select-mode', t === 'select');
  for (const id of ['poly', 'circle', 'select'])
    document.getElementById('t-' + id).classList.toggle('on', id === t);
  render();
}
function finishDraft(closed) {
  if (state.draft && state.draft.length >= 2) {
    pushUndo();
    state.elements.push({ kind: 'poly', pts: state.draft, closed, sw: 8, fill: 'none', dash: false });
    state.selected = state.elements.length - 1;
  }
  state.draft = null;
  render();
}

canvas.addEventListener('pointerdown', e => {
  const p = evtPos(e);
  if (state.tool === 'poly') {
    if (!state.draft) state.draft = [];
    const last = state.draft[state.draft.length - 1];
    if (!last || last[0] !== p[0] || last[1] !== p[1]) state.draft.push(p);
    render();
    return;
  }
  if (state.tool === 'circle') {
    pushUndo();
    const el = { kind: 'circle', cx: p[0], cy: p[1], r: 0, sw: 8, fill: 'none' };
    state.elements.push(el);
    state.selected = state.elements.length - 1;
    state.drag = { type: 'radius', idx: state.selected };
    canvas.setPointerCapture(e.pointerId);
    render();
    return;
  }
  // select
  const handle = e.target.dataset && e.target.dataset.handle;
  const sel = state.elements[state.selected];
  if (handle !== undefined && handle !== '' && sel) {
    pushUndo();
    state.drag = handle === 'c' ? { type: 'move-circle', idx: state.selected }
      : handle === 'r' ? { type: 'radius', idx: state.selected }
      : { type: 'point', idx: state.selected, pi: +handle };
    canvas.setPointerCapture(e.pointerId);
    return;
  }
  const g = e.target.closest('g[data-idx]');
  if (g) {
    state.selected = +g.dataset.idx;
    const el = state.elements[state.selected];
    if (el.kind !== 'raw') {
      pushUndo();
      state.drag = { type: 'move', idx: state.selected, start: evtPos(e, false), orig: structuredClone(el) };
      canvas.setPointerCapture(e.pointerId);
    }
    render();
  } else {
    state.selected = -1;
    render();
  }
});

canvas.addEventListener('pointermove', e => {
  const p = evtPos(e);
  state.cursor = p;
  document.getElementById('coords').textContent = `x ${p[0]} · y ${p[1]}`;
  const d = state.drag;
  if (d) {
    const el = state.elements[d.idx];
    if (d.type === 'radius') el.r = Math.max(1, Math.round(Math.hypot(p[0] - el.cx, p[1] - el.cy)));
    else if (d.type === 'move-circle') { el.cx = p[0]; el.cy = p[1]; }
    else if (d.type === 'point') el.pts[d.pi] = p;
    else if (d.type === 'move') {
      const cur = evtPos(e, false);
      const dx = snapV(50 + cur[0] - d.start[0]) - 50, dy = snapV(50 + cur[1] - d.start[1]) - 50;
      if (el.kind === 'circle') { el.cx = d.orig.cx + dx; el.cy = d.orig.cy + dy; }
      else el.pts = d.orig.pts.map(q => [q[0] + dx, q[1] + dy]);
    }
    render();
  } else if (state.draft) {
    render();
  }
});

canvas.addEventListener('pointerup', () => {
  if (state.drag && state.drag.type === 'radius') {
    const el = state.elements[state.drag.idx];
    if (el.r < 1) { state.elements.splice(state.drag.idx, 1); state.selected = -1; }
  }
  state.drag = null;
  render();
});

canvas.addEventListener('dblclick', () => finishDraft(false));

document.addEventListener('keydown', e => {
  if (e.target.matches('input, textarea, select')) return;
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); undo(); return; }
  if (e.key === 'Enter') finishDraft(false);
  else if (e.key.toLowerCase() === 'c' && state.draft) finishDraft(true);
  else if (e.key === 'Escape') { state.draft = null; render(); }
  else if (e.key === 'Backspace' && state.draft) { state.draft.pop(); render(); }
  else if ((e.key === 'Delete' || e.key === 'Backspace') && state.selected >= 0) {
    pushUndo();
    state.elements.splice(state.selected, 1);
    state.selected = -1;
    render();
  }
});

/* ── 버튼 ── */
document.getElementById('t-poly').onclick = () => setTool('poly');
document.getElementById('t-circle').onclick = () => setTool('circle');
document.getElementById('t-select').onclick = () => setTool('select');
document.getElementById('b-close').onclick = () => finishDraft(true);
document.getElementById('b-finish').onclick = () => finishDraft(false);
document.getElementById('b-undo').onclick = undo;
document.getElementById('b-clear').onclick = () => {
  if (!state.elements.length || confirm('전체 지우기?')) { pushUndo(); state.elements = []; state.selected = -1; state.draft = null; render(); }
};
document.getElementById('snap').onchange = e => { state.snap = +e.target.value; };
document.getElementById('b-copy').onclick = async () => {
  try { await navigator.clipboard.writeText(toSvgString()); }
  catch { out.select(); document.execCommand('copy'); }
};
document.getElementById('b-import').onclick = () => importSvg(out.value);
